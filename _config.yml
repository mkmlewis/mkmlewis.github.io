
# Minimal Mistakes theme
# theme: minimal-mistakes-jekyll
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Site settings
title: "Maddy Lewis"
subtitle: "PhD Student in Glaciology"
url: "https://mkmlewis.github.io"

# Masthead image
logo: "/assets/images/avatar.png"

# Favicon
favicon: "/assets/images/favicon.png"

# Author sidebar info
author:
  name: Maddy Lewis
  bio: "PhD Student in Glaciology at the University of Bristol and the British Antarctic Survey."
  avatar: "/assets/images/avatar.png"
  email: maddy.lewis@bristol.ac.uk
  location: Bristol, UK
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "github.com/mkmlewis"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "linkedin.com/in/madeleine-lewis-49328754"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0009-0005-9821-2291"

# Site Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:maddy.lewis@bristol.ac.uk"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mkmlewis"
  since: "2026"

# Build settings
markdown: kramdown

# Include/exclude
include:
  - _pages
  - assets/images
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore

# Hide xml feed
atom_feed:
  hide: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: # true
      share: true
      related: true
